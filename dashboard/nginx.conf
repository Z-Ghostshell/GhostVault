# GhostVault dashboard only: static SPA at /dashboard/ (Vite base). API and MCP are on edge :8989 (/api/, /mcp/).
# Not interchangeable with other repos’ dashboard nginx (e.g. gis: different paths and upstreams).
server {
    listen 80;
    server_name localhost;
    client_max_body_size 8m;

    # Files live under html/dashboard/ (see Dockerfile)
    location /dashboard/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /dashboard/index.html;
    }

    location = /dashboard {
        return 301 /dashboard/;
    }

    location = / {
        return 302 /dashboard/;
    }
}
